<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Detector | Powered by Gemini</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --error-bg: #fee2e2;
            --error-text: #991b1b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            max-width: 650px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin: 0;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        input[type="file"], textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
            background-color: #f8fafc;
        }

        input[type="file"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
        }

        textarea { 
            height: 120px; 
            resize: vertical; 
        }

        .how-it-works {
            background-color: #eff6ff;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            border-left: 4px solid var(--primary);
        }

        .how-it-works h4 {
            margin: 0 0 8px 0;
            color: #1e3a8a;
            font-size: 0.95rem;
        }

        .how-it-works p {
            margin: 0;
            font-size: 0.85rem;
            color: #1e40af;
        }

        button { 
            width: 100%;
            padding: 14px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 1rem; 
            transition: background 0.2s, transform 0.1s; 
        }

        button:hover { 
            background: var(--primary-hover); 
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled { 
            background: #cbd5e1; 
            cursor: not-allowed; 
            transform: none;
        }

        #resultBox { 
            margin-top: 24px; 
            padding: 20px; 
            border-radius: 8px; 
            display: none; 
            white-space: pre-wrap;
            font-size: 0.95rem;
            line-height: 1.7;
            border: 1px solid var(--success-bg);
            background: var(--success-bg);
            color: var(--success-text);
        }

        #resultBox.error { 
            border-color: #fca5a5; 
            background: var(--error-bg); 
            color: var(--error-text); 
        }

        /* Loading Spinner */
        .loading-container {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>AI Content Detector</h1>
            <p>Instantly analyze images and text to spot AI generation.</p>
        </div>

        <div class="card">
            
            <div class="how-it-works">
                <h4>🔍 How it works</h4>
                <p>Upload a suspicious image, paste some text, or do both! Our digital forensic model will scan the content for common AI artifacts (like impossible geometry in photos) or robotic phrasing (in text).</p>
            </div>

            <div class="input-group">
                <label for="imageInput">1. Upload Image (Optional)</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>

            <div class="input-group">
                <label for="textInput">2. Paste Text (Optional)</label>
                <textarea id="textInput" placeholder="Paste the article, essay, or email here..."></textarea>
            </div>

            <button id="analyzeBtn" onclick="analyzeContent()">Analyze
