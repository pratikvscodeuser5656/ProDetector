<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Detector</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; color: #333; }
        .container { display: flex; flex-direction: column; gap: 15px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e9ecef; }
        input[type="file"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        textarea { height: 100px; resize: vertical; }
        button { padding: 12px; background: #0056b3; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 16px; transition: background 0.2s; }
        button:hover { background: #003d82; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        #resultBox { margin-top: 20px; padding: 15px; border: 1px solid #c3e6cb; background: #d4edda; border-radius: 5px; display: none; white-space: pre-wrap; }
        .error { border-color: #f5c6cb; background: #f8d7da; color: #721c24; }
        .loading { text-align: center; font-style: italic; color: #555; display: none; margin-top: 10px;}
    </style>
</head>
<body>

    <h2>AI Content Detector</h2>
    <p>Upload an image or paste text to check if it was generated by AI.</p>

    <div class="container">
        <label><strong>1. Upload Image (Optional)</strong></label>
        <input type="file" id="imageInput" accept="image/*">

        <label><strong>2. Paste Text (Optional)</strong></label>
        <textarea id="textInput" placeholder="Paste text here..."></textarea>

        <button id="analyzeBtn" onclick="analyzeContent()">Analyze Content</button>
        <div id="loadingText" class="loading">Analyzing with Gemini... Please wait.</div>
    </div>

    <div id="resultBox"></div>

    <script>
        // --- PASTE YOUR API KEY HERE ---
        const API_KEY = "AIzaSyCzOq0sDuUYgQgsVWGo1CPNyrgMDsQQzqA"; 
        // -------------------------------

        // Helper function to convert an uploaded image to a Base64 string
        function fileToGenerativePart(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64Data = reader.result.split(',')[1];
                    resolve({
                        inlineData: {
                            data: base64Data,
                            mimeType: file.type
                        }
                    });
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function analyzeContent() {
            const imageFile = document.getElementById('imageInput').files[0];
            const textContent = document.getElementById('textInput').value.trim();
            const resultBox = document.getElementById('resultBox');
            const loadingText = document.getElementById('loadingText');
            const analyzeBtn = document.getElementById('analyzeBtn');

            if (API_KEY === "YOUR_API_KEY_HERE") {
                alert("Please add your actual API key to the script before running.");
                return;
            }

            if (!imageFile && !textContent) {
                alert("Please upload an image or enter some text to analyze.");
                return;
            }

            // UI updates
            resultBox.style.display = 'none';
            resultBox.className = '';
            loadingText.style.display = 'block';
            analyzeBtn.disabled = true;

            try {
                const prompt = "Analyze the provided content (image, text, or both). Is it likely AI-generated or human-created? Provide your reasoning, looking for common AI artifacts in images (e.g., weird textures, impossible geometry) or robotic phrasing/hallucinations in text. If both are provided, analyze both.";
                
                let parts = [{ text: prompt }];

                if (textContent) {
                    parts.push({ text: `\n\nContent to analyze: "${textContent}"` });
                }

                if (imageFile) {
                    const imagePart = await fileToGenerativePart(imageFile);
                    parts.push(imagePart);
                }

                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const requestBody = {
                    contents: [{
                        parts: parts
                    }]
                };

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();

                if (response.ok && data.candidates && data.candidates.length > 0) {
                    const analysisText = data.candidates[0].content.parts[0].text;
                    resultBox.innerHTML = `<strong>Analysis Results:</strong><br><br>${analysisText}`;
                } else {
                    throw new Error(data.error?.message || "Unknown API error occurred.");
                }

            } catch (error) {
                resultBox.className = 'error';
                resultBox.innerHTML = `<strong>Error:</strong> ${error.message}`;
            } finally {
                loadingText.style.display = 'none';
                resultBox.style.display = 'block';
                analyzeBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
