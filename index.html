<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Detector | Rave Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Modak&display=swap" rel="stylesheet">
    
    <style>
        /* --- CARAMELLDANSEN RAINBOW ANIMATION --- */
        @keyframes caramelldansen {
            0%   { background-color: #ff0055; }
            16%  { background-color: #ffaa00; }
            33%  { background-color: #ffee00; }
            50%  { background-color: #00ff00; }
            66%  { background-color: #00aaff; }
            83%  { background-color: #aa00ff; }
            100% { background-color: #ff0055; }
        }

        /* --- CHRISTMAS LIGHTS FLICKER --- */
        @keyframes flicker {
            0%, 100% { opacity: 1; filter: brightness(1.2) drop-shadow(0 0 5px currentColor); }
            50% { opacity: 0.4; filter: brightness(0.8) drop-shadow(0 0 0px currentColor); }
        }

        /* --- FLOATING DANCE ANIMATION --- */
        @keyframes floatDance {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(50px, -20px) rotate(10deg); }
            50% { transform: translate(100px, 0) rotate(0deg); }
            75% { transform: translate(50px, 20px) rotate(-10deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        body { 
            font-family: 'Inter', sans-serif; 
            animation: caramelldansen 0.8s infinite; 
            color: var(--text-main);
            margin: 0;
            padding: 60px 20px 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Christmas Lights Container */
        .light-string {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 30px;
            display: flex;
            justify-content: space-around;
            padding: 5px 0;
            z-index: 2000;
            background: rgba(0,0,0,0.2);
            pointer-events: none;
        }

        .light {
            width: 15px;
            height: 22px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: relative;
        }

        /* Different colored lights with staggered flicker */
        .light.red { color: #ff0000; background: #ff0000; animation: flicker 0.6s infinite; }
        .light.green { color: #00ff00; background: #00ff00; animation: flicker 0.8s infinite 0.2s; }
        .light.blue { color: #0000ff; background: #0000ff; animation: flicker 0.7s infinite 0.4s; }
        .light.yellow { color: #ffff00; background: #ffff00; animation: flicker 0.9s infinite 0.1s; }

        /* Background Dancing Girls */
        .bg-dancer {
            position: fixed;
            width: 150px;
            height: auto;
            z-index: -1;
            opacity: 0.5;
            pointer-events: none;
        }

        .dancer-left { top: 20%; left: 5%; animation: floatDance 4s infinite linear; }
        .dancer-right { bottom: 20%; right: 5%; animation: floatDance 5s infinite linear reverse; }

        .fun-header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 0 auto 30px auto;
            max-width: 650px;
            width: 100%;
            z-index: 10;
        }

        .confused-gemini-img {
            max-height: 120px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            animation: bounce 0.8s infinite alternate; 
        }

        @keyframes bounce {
            from { transform: translateY(0px); }
            to { transform: translateY(-10px); }
        }

        .fun-font-text {
            font-family: 'Modak', cursive;
            font-size: 3.5rem;
            color: #1e3a8a;
            text-shadow: 
                -3px -3px 0 #fff, 3px -3px 0 #fff, -3px 3px 0 #fff, 3px 3px 0 #fff,
                0 6px 10px rgba(0,0,0,0.3);
        }

        /* Card Styles */
        :root {
            --primary: #2563eb;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --border-color: #e2e8f0;
        }

        .app-container {
            max-width: 650px;
            width: 100%;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 30px;
            border: 4px solid #fff;
        }

        textarea { 
            width: 100%; 
            height: 120px;
            padding: 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            background-color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        button { 
            width: 100%;
            padding: 14px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 8px; 
            font-weight: 600; 
            margin-top: 15px;
        }

        #resultBox { 
            margin-top: 24px; 
            padding: 20px; 
            border-radius: 8px; 
            display: none; 
            white-space: pre-wrap;
            background: #dcfce7;
            color: #166534;
        }

        #resultBox.error { 
            background: #fee2e2; 
            color: #991b1b; 
        }

        .loading-container { display: none; text-align: center; margin-top: 20px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="light-string">
        <div class="light red"></div><div class="light green"></div>
        <div class="light blue"></div><div class="light yellow"></div>
        <div class="light red"></div><div class="light green"></div>
        <div class="light blue"></div><div class="light yellow"></div>
        <div class="light red"></div><div class="light green"></div>
        <div class="light blue"></div><div class="light yellow"></div>
    </div>

    <img src="girl1.png" class="bg-dancer dancer-left" alt="">
    <img src="girl2.png" class="bg-dancer dancer-right" alt="">

    <div class="fun-header-container">
        <img src="confused-gemini.png" alt="Confused Gemini Anime Girl" class="confused-gemini-img">
        <div class="fun-font-text">GEMINI IS STUPID</div>
    </div>

    <div class="app-container">
        <div class="card">
            <div style="background-color: #eff6ff; border-radius: 8px; padding: 16px; margin-bottom: 24px; border-left: 4px solid var(--primary);">
                <h4 style="margin:0; color:#1e3a8a;">🔍 Forensic Mode Active</h4>
                <p style="margin:5px 0 0 0; font-size:0.85rem; color:#1e40af;">Upload an image or paste text to see if it's AI-generated.</p>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="font-weight:600; display:block; margin-bottom:8px;">1. Upload Image</label>
                <input type="file" id="imageInput" accept="image/*" style="width:100%;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="font-weight:600; display:block; margin-bottom:8px;">2. Paste Text</label>
                <textarea id="textInput" placeholder="Paste content here..."></textarea>
            </div>

            <button id="analyzeBtn" onclick="analyzeContent()">Analyze Content</button>
            
            <div id="loadingContainer" class="loading-container">
                <div class="spinner"></div>
                <div style="margin-top:10px; color:#64748b; font-size:0.9rem;">Raving through the data...</div>
            </div>

            <div id="resultBox"></div>
        </div>
    </div>

    <script>
        function fileToGenerativePart(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64Data = reader.result.split(',')[1];
                    resolve({ inlineData: { data: base64Data, mimeType: file.type } });
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function analyzeContent() {
            const imageFile = document.getElementById('imageInput').files[0];
            const textContent = document.getElementById('textInput').value.trim();
            const resultBox = document.getElementById('resultBox');
            const loadingContainer = document.getElementById('loadingContainer');
            const analyzeBtn = document.getElementById('analyzeBtn');

            if (!imageFile && !textContent) {
                alert("Please provide something to analyze!");
                return;
            }

            resultBox.style.display = 'none';
            resultBox.className = '';
            loadingContainer.style.display = 'block';
            analyzeBtn.disabled = true;

            try {
                const prompt = "Analyze the provided content. Is it likely AI-generated or human-created? Provide your response strictly in this format: VERDICT, CONFIDENCE, and REASONING.";
                let parts = [{ text: prompt }];
                if (textContent) parts.push({ text: textContent });
                if (imageFile) {
                    const imagePart = await fileToGenerativePart(imageFile);
                    parts.push(imagePart);
                }

                const response = await fetch('/api/detect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: parts }], generationConfig: { temperature: 0.1 } })
                });

                if (!response.ok) throw new Error(`Server error. Images must be under 3.5MB!`);

                const data = await response.json();
                const analysisText = data.candidates[0].content.parts[0].text;
                resultBox.innerHTML = `<strong>Analysis Results:</strong><br><br>${analysisText}`;

            } catch (error) {
                resultBox.className = 'error';
                resultBox.innerHTML = `<strong>Error:</strong> ${error.message}`;
            } finally {
                loadingContainer.style.display = 'none';
                resultBox.style.display = 'block';
                analyzeBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
